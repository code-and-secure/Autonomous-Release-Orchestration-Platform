apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: autonomous-release-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example-org/autonomous-release-orchestration-platform.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
